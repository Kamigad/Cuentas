<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Sistema de Manejo de Cuentas</title>
    <link rel="stylesheet" href="https://unpkg.com/primeflex@3.3.1/primeflex.css"/>
</h:head>
<h:body>
    <div class="card">
        <h:form id="forma-cuentas">
            <p:growl id="mensajes" showDetail="true"/>

            <div class="card">
                <p:menubar>
                    <p:menuitem value="Inicio" icon ="pi pi-fw pi-user"
                                update=":forma-cuentas:cuentas-tabla"
                                actionListener="#{indexControlador.cargarDatos}"/>
                    <p:menuitem value="Nueva Cuenta" icon="pi pi-fw pi-plus"
                                update=":forma-modal:cuenta-ventana"
                                onclick="PF('ventanaModalCuenta').show()"/>
                </p:menubar>
            </div>
            <div class="card">
                <p:dataTable value="#{indexControlador.cuentas}" var="cuenta"
                id="cuentas-tabla" widgetVar="cuentasTabla">

                    <f:facet name="header">
                        <div class="flex justify-content-center flex-wrap card-container yellow-container">
                            <div class="flex align-items-center justify-content-center w-20rem h-4rem
                                    bg-yellow-500 font-bold text-gray-900 border-round m-2">
                                <h3>Sistema de Cuentas Bancarias</h3>
                            </div>
                        </div>
                    </f:facet>

                    <p:column headerText="Id">
                        <h:outputText value="#{cuenta.idCuenta}"/>
                    </p:column>

                    <p:column headerText="Nombre">
                        <h:outputText value="#{cuenta.nombre}"/>
                    </p:column>

                    <p:column headerText="Tipo Cuenta">
                        <h:outputText value="#{cuenta.tipoCuenta}"/>
                    </p:column>

                    <p:column headerText="Saldo">
                        <h:outputText value="#{cuenta.saldo}">
                            <f:convertNumber type="currency" currencySymbol="$"/>
                        </h:outputText>
                    </p:column>

                </p:dataTable>
            </div>
        </h:form>

        <h:form id="forma-modal">
            <p:dialog header="Detalles Cuenta" showEffect="fade"
                      modal="true" widgetVar="ventanaModalCuenta"
                      responsive="true">
                <p:outputPanel id="cuenta-ventana" class="ui-fluid">
                    <div class="field">
                        <p:outputLabel for="nombre">Nombre</p:outputLabel>
                        <p:inputText id="nombre"
                                      value="#{indexControlador.cuentaAgregada.nombre}"
                                      required="true"/>
                    </div>
                    <div class="field">
                        <p:outputLabel for="tipoCuenta">Tipo Cuenta</p:outputLabel>
                        <p:selectOneMenu id="tipoCuenta"
                                         value="#{indexControlador.cuentaAgregada.tipoCuenta}">
                            <f:selectItem itemLabel="Selecciona" itemValue=""/>
                            <f:selectItems value="#{indexControlador.tiposCuenta}"
                                          var="tipo" itemLabel="#{tipo.descripcion}" itemValue="#{tipo}"/>
                        </p:selectOneMenu>
                    </div>
                    <div class="field">
                        <p:outputLabel for="saldo">Saldo</p:outputLabel>
                        <p:inputNumber id="saldo"
                                       value="#{indexControlador.cuentaAgregada.saldo}"/>
                    </div>
                </p:outputPanel>
            </p:dialog>
        </h:form>
    </div>
</h:body>
</html>
